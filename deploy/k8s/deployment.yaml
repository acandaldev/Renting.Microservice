apiVersion: apps/v1
kind: Deployment
metadata:
  name: renting-api
  labels:
    app: renting-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: renting-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: renting-api
    spec:
      containers:
      - name: renting-api
        # La etiqueta __IMAGE_TAG__ será reemplazada automáticamente por GitHub Actions
        image: __IMAGE_TAG__
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: KeyVaultName
          value: "__KEY_VAULT_NAME__"
